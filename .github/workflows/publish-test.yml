name: npm-publish-test

on:
    push:
        branches: [master]

concurrency:
    group: publish-test-${{ github.ref }}
    cancel-in-progress: true

jobs:
    publish-gpr:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            packages: write
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org
                  cache: pnpm

            - name: Setup
              run: |
                  node -v
                  pnpm -v
                  pnpm install --frozen-lockfile

            - name: Build
              run: pnpm dist
              env:
                  NODE_OPTIONS: --max-old-space-size=6144

            - name: Gen .npmrc
              run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ./.npmrc

            - name: Publish (test)
              run: pnpm pub --test
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Sync to npmmirror
              if: always()
              run: |
                  PACKAGES=(
                      "@gitmars/monorepo"
                      "@gitmars/api"
                      "@gitmars/build"
                      "@gitmars/cache"
                      "@gitmars/core"
                      "@gitmars/git"
                      "@gitmars/go"
                      "@gitmars/hook"
                      "@gitmars/utils"
                      "gitmars"
                      "@gitmars/docs"
                  )
                  for pkg in "${PACKAGES[@]}"; do
                      echo "Syncing $pkg..."
                      curl -sSL -X PUT -d "sync_upstream=true" "https://registry-direct.npmmirror.com/$pkg/sync" || true
                  done
